name: FocusLock Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest psutil flask sentence_transformers scikit-learn numpy joblib
        
    - name: Run pytest
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest tests/ -v
